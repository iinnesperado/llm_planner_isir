# Franka Simulation Configuration
# Define the world objects and their initial state

world_objects:
  mug:
    location: 'table'
  
  plate:
    location: 'table'
  
  bottle:
    location: 'shelf'
  
  banana:
    location: 'table'

# Initial robot location
initial_location: 'base'

# Locations in the environment
locations:
  - 'base'       # Robot base
  - 'table'      # Main table
  - 'shelf'      # High shelf
  - 'trash'      # Trash bin
